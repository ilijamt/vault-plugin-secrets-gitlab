# git-cliff configuration for vault-plugin-secrets-gitlab
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
    # strip trailing PR numbers from the subject so the template owns formatting
    { pattern = '\s+\(#\d+\)\s*$', replace = "" },
]
commit_parsers = [
    { message = "^docs\\(changelog\\): regenerate CHANGELOG\\.md", skip  = true },
    { message = "^feat",                          group = "<!-- 0 -->Features" },
    { message = "^fix",                           group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf",                          group = "<!-- 2 -->Performance" },
    { message = "^refactor",                      group = "<!-- 3 -->Refactor" },
    { message = "^docs",                          group = "<!-- 4 -->Documentation" },
    { message = "^test",                          group = "<!-- 5 -->Tests" },
    { message = "^ci",                            group = "<!-- 6 -->CI" },
    { message = "^build\\(deps\\)",               group = "<!-- 7 -->Dependencies" },
    { message = "^chore\\(deps\\)",               group = "<!-- 7 -->Dependencies" },
    { message = "^build",                         group = "<!-- 8 -->Build" },
    { message = "^chore\\(release\\)",            skip  = true },
    { message = "^chore",                         group = "<!-- 9 -->Chore" },
    { message = "^revert",                        group = "<!-- 10 -->Reverts" },
    { body    = ".*security",                     group = "<!-- 1 -->Bug Fixes" },
    { message = "^Merge",                         skip  = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
